        * {

            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #sidebar {
            width: 380px;
            height: 100%;
            background: #f8f9fa;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            height: 100%;
        }

        .header {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid #e9ecef;
        }

        .header h1 {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .header p {
            color: #718096;
            font-size: 0.9rem;
        }

        .property-list {
            padding: 15px;
            flex: 1;
        }

        .property-card {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            border-left: 4px solid transparent;
            transition: all 0.2s;
        }

        .property-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .property-card.active {
            border-left-color: #667eea;
            background: #f0f4ff;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .badge-new { background: #d4edda; color: #155724; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
        .badge-interested { background: #fff3cd; color: #856404; }

        .card-title {
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .card-price {
            color: #e53e3e;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .card-details {
            font-size: 0.85rem;
            color: #4a5568;
            margin-top: 8px;
            line-height: 1.4;
        }

        .transport-info {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.8rem;
            color: #718096;
        }

        .transport-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3px;
        }

        /* Marker Custom Styles */
        .custom-div-icon {
            background: transparent;
            border: none;
        }
        
        .marker-pin {
            width: 30px;
            height: 30px;
            border-radius: 50% 50% 50% 0;
            background: #667eea;
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -15px 0 0 -15px;
            box-shadow: 0 3px 5px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marker-pin::after {
            content: '';
            width: 14px;
            height: 14px;
            margin: 0; /* manually centered */
            background: #fff;
            border-radius: 50%;
            transform: rotate(45deg); /* counteract parent rotation */
        }

        .marker-icon-text {
            position: absolute;
            transform: rotate(45deg);
            font-size: 10px;
            font-weight: bold;
            color: #667eea;
            z-index: 10;
            margin-left: 8px; /* Adjustment for visual center */
            margin-bottom: 8px; /* Adjustment for visual center */
        }

        .marker-rejected .marker-pin { background: #A0AEC0; }
        .marker-rejected .marker-icon-text { color: #A0AEC0; }
        
        .marker-interested .marker-pin { background: #48BB78; }
        .marker-interested .marker-icon-text { color: #48BB78; }
        
        .marker-new .marker-pin { background: #E53E3E; }
        .marker-new .marker-icon-text { color: #E53E3E; }

        /* Expandable Details Styles */
        .details-toggle {
            width: 100%;
            margin-top: 10px;
            padding: 8px;
            background: #edf2f7;
            border: 1px solid #e2e8f0;
            border-radius: 5px;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .details-toggle:hover {
            background: #e2e8f0;
        }

        .details-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: #fff;
            margin-top: 0;
            font-size: 0.85rem;
        }

        .details-content.expanded {
            max-height: 1000px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #cbd5e0;
        }

        .spec-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .spec-item {
            background: #f7fafc;
            padding: 5px 8px;
            border-radius: 4px;
            border: 1px solid #edf2f7;
        }

        .spec-label {
            font-size: 0.7rem;
            color: #718096;
            display: block;
        }

        .spec-value {
            font-weight: 600;
            color: #2d3748;
        }

        .feature-list {
            list-style: none;
        }

        .feature-list li {
            margin-bottom: 4px;
            padding-left: 18px;
            position: relative;
            color: #4a5568;
        }

        .feature-list li::before {
            content: '✅';
            position: absolute;
            left: 0;
            font-size: 0.8rem;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.08);
            }
            100% {
                transform: scale(1);
            }

        }

        .filter-container {

            background: #fff;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex-shrink: 0;

            gap: 10px;

            border-radius: 6px;
            font-size: 0.85rem;
            flex: 1;
            color: #4a5568;
            outline: none;

            color: #4a5568;
            font-size: 0.8rem;

            position: fixed;
            bottom: 20px;
            left: 50%;

            color: white;

                z-index: 1001;

                background: #fff;
            }
            #sidebar.show {
                transform: translateY(0);
                box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
            }
            #mobile-toggle {
                display: block;
            }
            .header h1 {
                font-size: 1.2rem;
            }

    // 距離計算函數 (Haversine formula)
    function getDistance(lat1, lon1, lat2, lon2) {
        var R = 6371; // km
        var dLat = (lat2-lat1) * Math.PI / 180;
        var dLon = (lon2-lon1) * Math.PI / 180;
        var a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon/2) * Math.sin(dLon/2);
        var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        var d = R * c;
        return d * 1; // return number
    }

    // 尋找最近設施
    function findNearest(lat, lng, facilitiesList) {
        let minInfo = { dist: Infinity, name: '' };
        facilitiesList.forEach(fac => {
            const d = getDistance(lat, lng, fac.lat, fac.lng);
            if(d < minInfo.dist) {
                minInfo.dist = d;
                minInfo.name = fac.name;
            }
        });
        return {
            dist: minInfo.dist.toFixed(1),
            name: minInfo.name
        };
    }

    // 真實路徑 API (OSRM)
    async function calculateRealRoute(prop, nearestTrain, nearestHighway, containerNode) {
        try {
            // OSRM Table Service
            // 經緯度組合順序： 物件本體 ; 最近火車 ; 最近國五 ; 台北101
            const coords = [
                `${prop.lng},${prop.lat}`,
                `${nearestTrain.lng},${nearestTrain.lat}`,
                `${nearestHighway.lng},${nearestHighway.lat}`,
                `${longDistanceTargets.taipei.lng},${longDistanceTargets.taipei.lat}`
            ].join(';');
            
            // OSRM Public API
            const url = `https://router.project-osrm.org/table/v1/driving/${coords}?sources=0&annotations=duration,distance`;
            
            containerNode.innerHTML = '🚗 計算中...';
            const response = await fetch(url);
            const data = await response.json();
            
            if(data.code === 'Ok') {
                const durations = data.durations[0]; // 秒數 array
                const distances = data.distances[0]; // 公尺 array
                
                // durations[1] = 到火車, [2] = 到國五, [3] = 到台北
                const t1 = Math.round(durations[1]/60);
                const t2 = Math.round(durations[2]/60);
                const t3 = Math.round(durations[3]/60);
                
                const d1 = (distances[1]/1000).toFixed(1);
                const d2 = (distances[2]/1000).toFixed(1);
                const d3 = (distances[3]/1000).toFixed(1);
                
                containerNode.innerHTML = `已更新真實車程 ✅`;
                containerNode.style.background = '#d4edda';
                containerNode.style.color = '#155724';
                containerNode.style.border = '1px solid #c3e6cb';
                
                // 更新畫面上的數字
                const tr = document.getElementById(`tr-${prop.id}-train`);
                const hw = document.getElementById(`tr-${prop.id}-hw`);
                const tp = document.getElementById(`tr-${prop.id}-tp`);
                
                if(tr) tr.innerHTML = `${nearestTrain.name} (${d1}km / 開車約 ${t1} 分鐘)`;
                if(hw) hw.innerHTML = `${nearestHighway.name} (${d2}km / 開車約 ${t2} 分鐘)`;
                if(tp) tp.innerHTML = `約 ${d3}km (開車約 ${t3} 分鐘)`;
            } else {
                containerNode.innerHTML = '❌ 路線計算失敗，請稍後重試';
            }
        } catch(e) {
            console.error(e);
            containerNode.innerHTML = '❌ API 連線錯誤，請稍後重試';
        }
    }


    // 繪製與篩選系統
    function renderProperties(dataList) {
        // 清空列表與地圖標記
        propertyList.innerHTML = '';
        facilityLayers.properties.clearLayers();
        Object.keys(markers).forEach(k => delete markers[k]);

        if(dataList.length === 0) {
            propertyList.innerHTML = '<div style="padding: 20px; text-align: center; color: #718096; margin-top: 20px;">找不到符合條件的物件 🏠</div>';
            return;
        }

        dataList.forEach(prop => {
            // --- 計算直線距離 (當作預設值) ---
            const distTaipei = getDistance(prop.lat, prop.lng, longDistanceTargets.taipei.lat, longDistanceTargets.taipei.lng).toFixed(1);
            const distHualien = getDistance(prop.lat, prop.lng, longDistanceTargets.hualien.lat, longDistanceTargets.hualien.lng).toFixed(1);
            
            let minTrain = {dist: Infinity, item: null};
            facilities.train.forEach(f => {
                let d = getDistance(prop.lat, prop.lng, f.lat, f.lng);
                if(d < minTrain.dist) { minTrain.dist = d; minTrain.item = f; }
            });

            let minHw = {dist: Infinity, item: null};
            facilities.highway.forEach(f => {
                let d = getDistance(prop.lat, prop.lng, f.lat, f.lng);
                if(d < minHw.dist) { minHw.dist = d; minHw.item = f; }
            });

            let nearestTrain = { name: minTrain.item.name, dist: minTrain.dist.toFixed(1), lat: minTrain.item.lat, lng: minTrain.item.lng };
            let nearestHighway = { name: minHw.item.name, dist: minHw.dist.toFixed(1), lat: minHw.item.lat, lng: minHw.item.lng };

            const nearestBus = findNearest(prop.lat, prop.lng, facilities.bus);
            const distHSR = getDistance(prop.lat, prop.lng, facilities.hsr[0].lat, facilities.hsr[0].lng).toFixed(1);

            // --- UI 邏輯 ---
            let badgeClass = 'badge-rejected';
            let badgeText = '❌ 不考慮';
            let markerClass = 'marker-rejected';

            if(prop.status === 'new') {
                badgeClass = 'badge-new';
                badgeText = '✨ 推薦物件';
                markerClass = 'marker-new';
            } else if(prop.status === 'interested') {
                badgeClass = 'badge-interested';
                badgeText = '❤️ 有興趣';
                markerClass = 'marker-interested';
            }

            // --- 卡片 ---
            const card = document.createElement('div');
            card.className = `property-card ${prop.status}`;
            card.id = `card-${prop.id}`;
            
            let imageHtml = '';
            if(prop.image) {
                imageHtml = `<div style="margin-bottom:10px; border-radius:8px; overflow:hidden; height:150px; background:#eee;">
                                <img src="${prop.image}" style="width:100%; height:100%; object-fit:cover;" alt="${prop.name}">
                             </div>`;
            }

            let linkHtml = '';
            if(prop.url) {
                linkHtml = `<a href="${prop.url}" target="_blank" style="display:block; text-align:center; background:#667eea; color:white; text-decoration:none; padding:8px; border-radius:5px; margin-top:10px; font-weight:bold; font-size:0.9rem;">
                                🔎 查看外部連結
                            </a>`;
            }

            let detailsHtml = '';
            if(prop.fullDetails) {
                const specHtml = prop.fullDetails.specs.map(s => `
                    <div class="spec-item">
                        <span class="spec-label">${s.label}</span>
                        <span class="spec-value">${s.value}</span>
                    </div>
                `).join('');

                const featureHtml = prop.fullDetails.features.map(f => `<li>${f}</li>`).join('');

                detailsHtml = `
                    <button class="details-toggle" id="toggle-${prop.id}">
                        <span>📜 查看詳細規格</span> <small>▼</small>
                    </button>
                    <div class="details-content" id="content-${prop.id}">
                        <div class="spec-grid">${specHtml}</div>
                        <ul class="feature-list">${featureHtml}</ul>
                    </div>
                `;
            }

            card.innerHTML = `
                ${imageHtml}
                <span class="badge ${badgeClass}">${badgeText}</span>
                <div class="card-title">${prop.name}</div>
                <div class="card-price">NT$ ${prop.price} 萬</div>
                <div class="card-details">
                    📍 ${prop.address}<br>
                    📝 ${prop.note}
                </div>
                ${detailsHtml}
                <div class="transport-info">
                    <div class="transport-item" style="color:#2b6cb0; font-weight:bold;"><span>🚂 最近火車</span> <span id="tr-${prop.id}-train">${nearestTrain.name} (直線 ${nearestTrain.dist} km)</span></div>
                    <div class="transport-item" style="color:#c05621; font-weight:bold;"><span>🛣️ 最近國五</span> <span id="tr-${prop.id}-hw">${nearestHighway.name} (直線 ${nearestHighway.dist} km)</span></div>
                    <div class="transport-item"><span>🚌 最近公車</span> <span>${nearestBus.name} (直線 ${nearestBus.dist} km)</span></div>
                    <div class="transport-item"><span>🚄 宜蘭高鐵</span> <span>直線 ${distHSR} km</span></div>
                    <div class="transport-item"><span>🚗 往台北</span> <span id="tr-${prop.id}-tp">直線 ${distTaipei} km</span></div>
                    <div class="transport-item"><span>🚗 往花蓮</span> <span>直線 ${distHualien} km</span></div>
                    
                    <button class="btn-real-route" id="routeBtn-${prop.id}">🚗 點擊取得真實開車距離與時間</button>
                </div>
                ${linkHtml}
            `;

            card.addEventListener('click', (e) => {
                if (e.target.closest('.details-toggle') || e.target.closest('.btn-real-route') || e.target.closest('a')) return;
                
                // On mobile, hide sidebar on card click
                const sidebar = document.getElementById('sidebar');
                if(window.innerWidth <= 768 && sidebar) {
                    sidebar.classList.remove('show');
                    const mobileToggle = document.getElementById('mobile-toggle');
                    if (mobileToggle) {
                        mobileToggle.innerHTML = '📋 顯示物件列表';
                        mobileToggle.style.background = '#4a5568';
                    }
                }
                
                map.flyTo([prop.lat, prop.lng], 16, { duration: 0.8 });
                highlighCard(prop.id);
                
                // Find marker in cluster and zoom to it
                const m = markers[prop.id];
                if(m && facilityLayers.properties) {
                    facilityLayers.properties.zoomToShowLayer(m, function() {
                        m.openPopup();
                    });
                }
            });

            if(prop.fullDetails) {
                const toggleBtn = card.querySelector(`#toggle-${prop.id}`);
                const content = card.querySelector(`#content-${prop.id}`);
                toggleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    content.classList.toggle('expanded');
                    toggleBtn.querySelector('small').innerHTML = content.classList.contains('expanded') ? '▲' : '▼';
                });
            }

            // 真實路線按鈕
            const routeBtn = card.querySelector(`#routeBtn-${prop.id}`);
            routeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                calculateRealRoute(prop, nearestTrain, nearestHighway, routeBtn);
            });

            propertyList.appendChild(card);

            // --- 地圖 Marker ---
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="${markerClass}"><div class="marker-pin"></div><i class="marker-icon-text"></i></div>`,
                iconSize: [30, 42],
                iconAnchor: [15, 42]
            });

            const marker = L.marker([prop.lat, prop.lng], { icon: icon })
                .bindPopup(`<b>${prop.name}</b><br>${prop.price}萬`);
            
            marker.on('click', () => {
                highlighCard(prop.id);
                const c = document.getElementById(`card-${prop.id}`);
                if(c) c.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            markers[prop.id] = marker;
            marker.addTo(facilityLayers.properties);
        });
    }

    // 預處理 filter 用的搜尋字串
    properties.forEach(p => {
        let sText = `${p.name} ${p.address} ${p.note}`;
        if(p.fullDetails) sText += " " + p.fullDetails.features.join(" ");
        p._searchText = sText.toLowerCase();
    });

    // Filter Logic
    const searchInput = document.getElementById('searchInput');
    const priceFilter = document.getElementById('priceFilter');
    const statusFilter = document.getElementById('statusFilter');
    const sortSelect = document.getElementById('sortSelect');

    function applyFilters() {
        if (!searchInput) return; // safeguard
        const keyword = searchInput.value.toLowerCase();
        const priceVal = priceFilter.value;
        const statusVal = statusFilter.value;
        const sortVal = sortSelect.value;

        // 1. 篩選
        let filtered = properties.filter(p => {
            if(keyword && !p._searchText.includes(keyword)) return false;
            if(statusVal !== 'all' && p.status !== statusVal) return false;
            
            if(priceVal === 'under800' && p.price >= 800) return false;
            if(priceVal === '800to1200' && (p.price < 800 || p.price > 1200)) return false;
            if(priceVal === 'over1200' && p.price <= 1200) return false;

            return true;
        });

        // 2. 排序
        if(sortVal === 'priceAsc') {
            filtered.sort((a,b) => a.price - b.price);
        } else if(sortVal === 'priceDesc') {
            filtered.sort((a,b) => b.price - a.price);
        }

        renderProperties(filtered);
    }

    if(searchInput) searchInput.addEventListener('input', applyFilters);
    if(priceFilter) priceFilter.addEventListener('change', applyFilters);
    if(statusFilter) statusFilter.addEventListener('change', applyFilters);
    if(sortSelect) sortSelect.addEventListener('change', applyFilters);

    // Initial render
    applyFilters();

    function highlighCard(id) {
        document.querySelectorAll('.property-card').forEach(c => c.classList.remove('active'));
        document.getElementById(`card-${id}`).classList.add('active');
    }
